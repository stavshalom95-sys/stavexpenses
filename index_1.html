<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הוצאות אשראי - סטב</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3248;
    --accent: #6366f1;
    --accent2: #818cf8;
    --accent-glow: rgba(99,102,241,0.18);
    --text: #e2e8f0;
    --text2: #94a3b8;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --radius: 12px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Rubik', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-title {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-icon {
    width: 42px; height: 42px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  header h1 {
    font-size: 1.4rem;
    font-weight: 700;
    color: white;
    letter-spacing: -0.5px;
  }

  header p {
    font-size: 0.8rem;
    color: #a5b4fc;
    margin-top: 2px;
  }

  .header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Rubik', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
  }

  .btn-primary:hover { background: #4f46e5; transform: translateY(-1px); }

  .btn-outline {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border);
  }

  .btn-outline:hover {
    border-color: var(--accent);
    color: var(--accent2);
  }

  /* MAIN LAYOUT */
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
  }

  /* SUMMARY CARDS */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .card:hover { border-color: var(--accent); }

  .card-label {
    font-size: 0.78rem;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  .card-value {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .card-sub {
    font-size: 0.8rem;
    color: var(--text2);
    margin-top: 4px;
  }

  .card-icon {
    position: absolute;
    top: 16px;
    left: 16px;
    font-size: 1.5rem;
    opacity: 0.3;
  }

  .card.accent { border-color: var(--accent); }
  .card.accent .card-value { color: var(--accent2); }

  /* FILTERS */
  .filters-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }

  .filter-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .filter-label {
    font-size: 0.72rem;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  select, input[type="text"], input[type="date"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Rubik', sans-serif;
    font-size: 0.85rem;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.2s;
    direction: rtl;
  }

  select:focus, input:focus {
    border-color: var(--accent);
  }

  select { min-width: 140px; cursor: pointer; }

  .search-box {
    flex: 1;
    min-width: 200px;
  }

  .search-box input {
    width: 100%;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px;
  }

  .tab {
    flex: 1;
    padding: 10px 16px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    font-family: 'Rubik', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    transition: all 0.2s;
    text-align: center;
  }

  .tab.active {
    background: var(--accent);
    color: white;
  }

  .tab:hover:not(.active) {
    background: var(--surface2);
    color: var(--text);
  }

  /* VIEW PANELS */
  .panel { display: none; }
  .panel.active { display: block; }

  /* TABLE */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .table-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .table-title {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text);
  }

  .table-count {
    font-size: 0.8rem;
    color: var(--text2);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }

  thead th {
    padding: 12px 16px;
    text-align: right;
    background: var(--surface2);
    color: var(--text2);
    font-weight: 500;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }

  thead th:hover { color: var(--accent2); }

  thead th.sort-asc::after { content: " ▲"; color: var(--accent); }
  thead th.sort-desc::after { content: " ▼"; color: var(--accent); }

  tbody tr {
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.15s;
  }

  tbody tr:hover { background: var(--surface2); }

  tbody td {
    padding: 11px 16px;
    color: var(--text);
    vertical-align: middle;
  }

  .amount-cell {
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  .cat-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 500;
    background: var(--accent-glow);
    color: var(--accent2);
    border: 1px solid rgba(99,102,241,0.3);
  }

  .date-cell {
    color: var(--text2);
    font-size: 0.82rem;
    white-space: nowrap;
  }

  /* PAGINATION */
  .pagination {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px;
    border-top: 1px solid var(--border);
  }

  .page-info {
    font-size: 0.82rem;
    color: var(--text2);
  }

  .page-btns {
    display: flex;
    gap: 6px;
  }

  .page-btn {
    width: 34px; height: 34px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
  }

  .page-btn:hover { border-color: var(--accent); color: var(--accent2); }
  .page-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* CHARTS */
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .chart-title {
    font-size: 0.9rem;
    font-weight: 600;
    margin-bottom: 16px;
    color: var(--text);
  }

  .bar-list { display: flex; flex-direction: column; gap: 10px; }

  .bar-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .bar-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .bar-name {
    font-size: 0.82rem;
    color: var(--text);
  }

  .bar-amount {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text);
  }

  .bar-track {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.5s ease;
  }

  /* MONTHLY CHART */
  .monthly-grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 6px;
    align-items: end;
    height: 180px;
    margin-top: 8px;
  }

  .month-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    height: 100%;
    justify-content: flex-end;
  }

  .month-bar {
    width: 100%;
    background: linear-gradient(180deg, var(--accent2), var(--accent));
    border-radius: 4px 4px 0 0;
    min-height: 4px;
    transition: all 0.4s ease;
    cursor: pointer;
    position: relative;
  }

  .month-bar:hover { background: linear-gradient(180deg, #a5b4fc, #818cf8); }

  .month-label {
    font-size: 0.65rem;
    color: var(--text2);
    text-align: center;
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 90%;
    max-width: 580px;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal h2 {
    font-size: 1.1rem;
    margin-bottom: 20px;
    color: var(--text);
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-group.full { grid-column: 1/-1; }

  .form-group label {
    font-size: 0.8rem;
    color: var(--text2);
    font-weight: 500;
  }

  .form-group select,
  .form-group input {
    width: 100%;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 20px;
  }

  .btn-danger {
    background: rgba(239,68,68,0.15);
    color: var(--red);
    border: 1px solid rgba(239,68,68,0.3);
  }

  .btn-danger:hover { background: rgba(239,68,68,0.25); }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text2);
  }

  .empty-icon { font-size: 3rem; margin-bottom: 12px; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1e293b;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 0.88rem;
    z-index: 9999;
    transition: transform 0.3s;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green); }
  .toast.error { border-color: var(--red); }

  /* YEAR SUMMARY */
  .year-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  .year-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    transition: border-color 0.2s;
  }

  .year-card:hover { border-color: var(--accent); }

  .year-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .year-num {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent2);
  }

  .year-total {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
  }

  .year-cats { display: flex; flex-direction: column; gap: 8px; }

  .year-cat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.82rem;
  }

  .year-cat-name { color: var(--text2); }
  .year-cat-amount { color: var(--text); font-weight: 500; }

  /* Responsive */
  @media (max-width: 768px) {
    .charts-grid { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .header-actions .btn-outline { display: none; }
    header h1 { font-size: 1.1rem; }
    .tabs .tab { font-size: 0.8rem; padding: 8px 10px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-title">
    <div class="header-icon">💳</div>
    <div>
      <h1>הוצאות אשראי</h1>
      <p id="dateRange">טוען נתונים...</p>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn btn-outline" onclick="exportCSV()">📥 ייצוא CSV</button>
    <button class="btn btn-primary" onclick="openAddModal()">➕ הוסף עסקה</button>
  </div>
</header>

<div class="container">

  <!-- SUMMARY CARDS -->
  <div class="summary-grid" id="summaryCards"></div>

  <!-- FILTERS -->
  <div class="filters-bar">
    <div class="filter-group search-box">
      <div class="filter-label">🔍 חיפוש</div>
      <input type="text" id="searchInput" placeholder="שם עסק, הערות..." oninput="applyFilters()">
    </div>
    <div class="filter-group">
      <div class="filter-label">שנה</div>
      <select id="filterYear" onchange="applyFilters()">
        <option value="">הכל</option>
      </select>
    </div>
    <div class="filter-group">
      <div class="filter-label">חודש</div>
      <select id="filterMonth" onchange="applyFilters()">
        <option value="">הכל</option>
        <option value="01">ינואר</option>
        <option value="02">פברואר</option>
        <option value="03">מרץ</option>
        <option value="04">אפריל</option>
        <option value="05">מאי</option>
        <option value="06">יוני</option>
        <option value="07">יולי</option>
        <option value="08">אוגוסט</option>
        <option value="09">ספטמבר</option>
        <option value="10">אוקטובר</option>
        <option value="11">נובמבר</option>
        <option value="12">דצמבר</option>
      </select>
    </div>
    <div class="filter-group">
      <div class="filter-label">קטגוריה</div>
      <select id="filterCategory" onchange="applyFilters()">
        <option value="">הכל</option>
      </select>
    </div>
    <div class="filter-group">
      <div class="filter-label">כרטיס</div>
      <select id="filterCard" onchange="applyFilters()">
        <option value="">הכל</option>
      </select>
    </div>
    <button class="btn btn-outline" onclick="clearFilters()">✕ נקה</button>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('transactions')">📋 עסקאות</button>
    <button class="tab" onclick="switchTab('analytics')">📊 ניתוח</button>
    <button class="tab" onclick="switchTab('yearly')">📅 לפי שנה</button>
  </div>

  <!-- TRANSACTIONS TAB -->
  <div class="panel active" id="panel-transactions">
    <div class="table-wrap">
      <div class="table-header">
        <span class="table-title">רשימת עסקאות</span>
        <span class="table-count" id="tableCount"></span>
      </div>
      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th onclick="sortBy('date')">תאריך</th>
              <th onclick="sortBy('business')">שם עסק</th>
              <th onclick="sortBy('category')">קטגוריה</th>
              <th onclick="sortBy('subCategory')">תת קטגוריה</th>
              <th onclick="sortBy('amount')">סכום</th>
              <th onclick="sortBy('card')">כרטיס</th>
              <th>הערות</th>
              <th>פעולות</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>

  <!-- ANALYTICS TAB -->
  <div class="panel" id="panel-analytics">
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">🏆 הוצאות לפי קטגוריה</div>
        <div class="bar-list" id="catChart"></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">📈 הוצאות לפי חודש</div>
        <div class="monthly-grid" id="monthlyChart"></div>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">📆 שנה אחר שנה</div>
      <div class="bar-list" id="yearChart"></div>
    </div>
  </div>

  <!-- YEARLY TAB -->
  <div class="panel" id="panel-yearly">
    <div class="year-grid" id="yearlyGrid"></div>
  </div>

</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modalTitle">➕ הוסף עסקה חדשה</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>תאריך *</label>
        <input type="date" id="fDate">
      </div>
      <div class="form-group">
        <label>סכום (₪) *</label>
        <input type="number" id="fAmount" placeholder="0.00" step="0.01">
      </div>
      <div class="form-group full">
        <label>שם עסק *</label>
        <input type="text" id="fBusiness" placeholder="שם בית העסק">
      </div>
      <div class="form-group">
        <label>קטגוריה</label>
        <select id="fCategory"></select>
      </div>
      <div class="form-group">
        <label>תת קטגוריה</label>
        <input type="text" id="fSubCategory" placeholder="תת קטגוריה">
      </div>
      <div class="form-group">
        <label>כרטיס</label>
        <select id="fCard"></select>
      </div>
      <div class="form-group">
        <label>מטבע</label>
        <select id="fCurrency">
          <option value="₪">שקל (₪)</option>
          <option value="$">דולר ($)</option>
          <option value="€">אירו (€)</option>
        </select>
      </div>
      <div class="form-group full">
        <label>הערות</label>
        <input type="text" id="fNotes" placeholder="הערות נוספות...">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="btnDelete" onclick="deleteTransaction()" style="display:none; margin-left:auto;">🗑️ מחק</button>
      <button class="btn btn-outline" onclick="closeModal()">ביטול</button>
      <button class="btn btn-primary" onclick="saveTransaction()">💾 שמור</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>

let allData = [];
let filtered = [];
let sortCol = 'date';
let sortDir = 'desc';
let currentPage = 1;
const PAGE_SIZE = 50;
let editingIdx = null;
let activeTab = 'transactions';

// ===== INIT =====
function init() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try {
      allData = JSON.parse(saved);
    } catch(e) {
      allData = [...BASE_DATA];
    }
  } else {
    allData = [...BASE_DATA];
  }
  
  populateFilters();
  applyFilters();
  renderSummary();
  
  // Set date range in header
  const dates = allData.map(r => r.date).sort();
  document.getElementById('dateRange').textContent = 
    dates[0] + ' — ' + dates[dates.length-1] + ' | ' + allData.length + ' עסקאות';
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(allData));
}

// ===== FILTERS =====
function populateFilters() {
  const years = [...new Set(allData.map(r => r.date.slice(0,4)))].sort().reverse();
  const cats = [...new Set(allData.map(r => r.category).filter(Boolean))].sort();
  const cards = [...new Set(allData.map(r => r.card).filter(c => c && c !== 'nan'))].sort();
  
  const fy = document.getElementById('filterYear');
  years.forEach(y => fy.innerHTML += `<option value="${y}">${y}</option>`);
  
  const fc = document.getElementById('filterCategory');
  cats.forEach(c => fc.innerHTML += `<option value="${c}">${c}</option>`);
  
  const fcard = document.getElementById('filterCard');
  cards.forEach(c => fcard.innerHTML += `<option value="${c}">${c}</option>`);
  
  // Modal dropdowns
  const mcat = document.getElementById('fCategory');
  mcat.innerHTML = '<option value="">ללא קטגוריה</option>';
  cats.forEach(c => mcat.innerHTML += `<option value="${c}">${c}</option>`);
  
  const mcard = document.getElementById('fCard');
  mcard.innerHTML = '<option value="">ללא כרטיס</option>';
  cards.forEach(c => mcard.innerHTML += `<option value="${c}">${c}</option>`);
}

function applyFilters() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const year = document.getElementById('filterYear').value;
  const month = document.getElementById('filterMonth').value;
  const category = document.getElementById('filterCategory').value;
  const card = document.getElementById('filterCard').value;
  
  filtered = allData.filter(r => {
    if (year && !r.date.startsWith(year)) return false;
    if (month && r.date.slice(5,7) !== month) return false;
    if (category && r.category !== category) return false;
    if (card && r.card !== card) return false;
    if (search) {
      const haystack = (r.business + r.notes + r.subCategory).toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });
  
  sortData();
  currentPage = 1;
  renderTable();
  renderAnalytics();
  renderSummary();
}

function clearFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('filterYear').value = '';
  document.getElementById('filterMonth').value = '';
  document.getElementById('filterCategory').value = '';
  document.getElementById('filterCard').value = '';
  applyFilters();
}

// ===== SORT =====
function sortBy(col) {
  if (sortCol === col) {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    sortCol = col;
    sortDir = col === 'date' || col === 'amount' ? 'desc' : 'asc';
  }
  sortData();
  currentPage = 1;
  renderTable();
  
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sort-asc','sort-desc');
  });
}

function sortData() {
  filtered.sort((a, b) => {
    let va = a[sortCol] || '';
    let vb = b[sortCol] || '';
    if (sortCol === 'amount') { va = +va; vb = +vb; }
    const r = va < vb ? -1 : va > vb ? 1 : 0;
    return sortDir === 'asc' ? r : -r;
  });
}

// ===== TABLE =====
function renderTable() {
  const total = filtered.length;
  const pages = Math.ceil(total / PAGE_SIZE);
  const start = (currentPage-1)*PAGE_SIZE;
  const end = Math.min(start+PAGE_SIZE, total);
  const rows = filtered.slice(start, end);
  
  document.getElementById('tableCount').textContent = 
    total.toLocaleString('he') + ' עסקאות | סה"כ: ₪' + filtered.reduce((s,r) => s+r.amount,0).toLocaleString('he', {maximumFractionDigits:0});
  
  const tbody = document.getElementById('tableBody');
  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty"><div class="empty-icon">🔍</div><div>לא נמצאו עסקאות</div></td></tr>';
  } else {
    tbody.innerHTML = rows.map((r, i) => {
      const realIdx = allData.indexOf(r);
      return `<tr>
        <td class="date-cell">${formatDate(r.date)}</td>
        <td>${escHtml(r.business)}</td>
        <td><span class="cat-badge">${escHtml(r.category)}</span></td>
        <td style="color:var(--text2);font-size:0.82rem">${escHtml(r.subCategory)}</td>
        <td class="amount-cell">${r.currency || '₪'}${r.amount.toLocaleString('he',{maximumFractionDigits:2})}</td>
        <td style="color:var(--text2);font-size:0.8rem">${escHtml(r.card)}</td>
        <td style="color:var(--text2);font-size:0.82rem;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(r.notes)}</td>
        <td><button class="btn btn-outline" style="padding:4px 10px;font-size:0.78rem" onclick="openEditModal(${realIdx})">✏️ ערוך</button></td>
      </tr>`;
    }).join('');
  }
  
  renderPagination(pages);
}

function renderPagination(pages) {
  if (pages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
  
  const pg = document.getElementById('pagination');
  let html = `<span class="page-info">עמוד ${currentPage} מתוך ${pages}</span><div class="page-btns">`;
  html += `<button class="page-btn" onclick="gotoPage(1)" ${currentPage===1?'disabled':''}>⟪</button>`;
  html += `<button class="page-btn" onclick="gotoPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  
  const start = Math.max(1, currentPage-2);
  const end = Math.min(pages, currentPage+2);
  for (let p = start; p <= end; p++) {
    html += `<button class="page-btn ${p===currentPage?'active':''}" onclick="gotoPage(${p})">${p}</button>`;
  }
  
  html += `<button class="page-btn" onclick="gotoPage(${currentPage+1})" ${currentPage===pages?'disabled':''}>›</button>`;
  html += `<button class="page-btn" onclick="gotoPage(${pages})" ${currentPage===pages?'disabled':''}>⟫</button>`;
  html += '</div>';
  pg.innerHTML = html;
}

function gotoPage(p) {
  currentPage = p;
  renderTable();
  window.scrollTo({top:0, behavior:'smooth'});
}

// ===== SUMMARY CARDS =====
function renderSummary() {
  const total = filtered.reduce((s,r) => s+r.amount, 0);
  const count = filtered.length;
  const months = new Set(filtered.map(r => r.date.slice(0,7))).size || 1;
  const avg = total / months;
  
  const catTotals = {};
  filtered.forEach(r => {
    catTotals[r.category] = (catTotals[r.category]||0) + r.amount;
  });
  const topCat = Object.entries(catTotals).sort((a,b)=>b[1]-a[1])[0];
  
  document.getElementById('summaryCards').innerHTML = `
    <div class="card accent">
      <div class="card-icon">💰</div>
      <div class="card-label">סה"כ הוצאות</div>
      <div class="card-value">₪${Math.round(total).toLocaleString('he')}</div>
      <div class="card-sub">${count.toLocaleString('he')} עסקאות</div>
    </div>
    <div class="card">
      <div class="card-icon">📅</div>
      <div class="card-label">ממוצע חודשי</div>
      <div class="card-value">₪${Math.round(avg).toLocaleString('he')}</div>
      <div class="card-sub">${months} חודשים</div>
    </div>
    <div class="card">
      <div class="card-icon">🏷️</div>
      <div class="card-label">קטגוריה מובילה</div>
      <div class="card-value" style="font-size:1.1rem">${topCat ? topCat[0] : '-'}</div>
      <div class="card-sub">${topCat ? '₪'+Math.round(topCat[1]).toLocaleString('he') : ''}</div>
    </div>
    <div class="card">
      <div class="card-icon">📊</div>
      <div class="card-label">עסקה ממוצעת</div>
      <div class="card-value">₪${count ? Math.round(total/count).toLocaleString('he') : 0}</div>
      <div class="card-sub">לעסקה</div>
    </div>
  `;
}

// ===== ANALYTICS =====
function renderAnalytics() {
  if (activeTab !== 'analytics') return;
  
  // Category chart
  const catTotals = {};
  filtered.forEach(r => {
    catTotals[r.category || 'אחר'] = (catTotals[r.category||'אחר']||0) + r.amount;
  });
  const sortedCats = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const maxCat = sortedCats[0]?.[1] || 1;
  
  document.getElementById('catChart').innerHTML = sortedCats.map(([cat, amt]) => `
    <div class="bar-item">
      <div class="bar-row">
        <span class="bar-name">${escHtml(cat)}</span>
        <span class="bar-amount">₪${Math.round(amt).toLocaleString('he')}</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${(amt/maxCat*100).toFixed(1)}%"></div>
      </div>
    </div>
  `).join('');
  
  // Monthly chart
  const months = ['ינו','פבר','מרץ','אפר','מאי','יונ','יול','אוג','ספ','אוק','נוב','דצ'];
  const monthTotals = Array(12).fill(0);
  filtered.forEach(r => {
    const m = parseInt(r.date.slice(5,7)) - 1;
    monthTotals[m] += r.amount;
  });
  const maxM = Math.max(...monthTotals) || 1;
  
  document.getElementById('monthlyChart').innerHTML = monthTotals.map((amt, i) => `
    <div class="month-col">
      <div class="month-bar" style="height:${(amt/maxM*160).toFixed(0)}px" 
           title="${months[i]}: ₪${Math.round(amt).toLocaleString('he')}"></div>
      <span class="month-label">${months[i]}</span>
    </div>
  `).join('');
  
  // Year chart
  const yearTotals = {};
  filtered.forEach(r => {
    const y = r.date.slice(0,4);
    yearTotals[y] = (yearTotals[y]||0) + r.amount;
  });
  const sortedYears = Object.entries(yearTotals).sort((a,b)=>b[0]-a[0]);
  const maxY = sortedYears[0]?.[1] || 1;
  
  document.getElementById('yearChart').innerHTML = sortedYears.map(([yr, amt]) => `
    <div class="bar-item">
      <div class="bar-row">
        <span class="bar-name" style="font-weight:600;color:var(--accent2)">${yr}</span>
        <span class="bar-amount">₪${Math.round(amt).toLocaleString('he')}</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${(amt/maxY*100).toFixed(1)}%"></div>
      </div>
    </div>
  `).join('');
}

// ===== YEARLY GRID =====
function renderYearly() {
  if (activeTab !== 'yearly') return;
  
  const years = [...new Set(allData.map(r => r.date.slice(0,4)))].sort().reverse();
  
  document.getElementById('yearlyGrid').innerHTML = years.map(yr => {
    const yData = allData.filter(r => r.date.startsWith(yr));
    const total = yData.reduce((s,r) => s+r.amount, 0);
    const catTotals = {};
    yData.forEach(r => {
      catTotals[r.category||'אחר'] = (catTotals[r.category||'אחר']||0) + r.amount;
    });
    const topCats = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).slice(0,5);
    
    return `
      <div class="year-card">
        <div class="year-card-header">
          <span class="year-num">${yr}</span>
          <span class="year-total">₪${Math.round(total).toLocaleString('he')}</span>
        </div>
        <div style="font-size:0.78rem;color:var(--text2);margin-bottom:10px">${yData.length} עסקאות | ממוצע חודשי: ₪${Math.round(total/12).toLocaleString('he')}</div>
        <div class="year-cats">
          ${topCats.map(([cat,amt]) => `
            <div class="year-cat-row">
              <span class="year-cat-name">${escHtml(cat)}</span>
              <span class="year-cat-amount">₪${Math.round(amt).toLocaleString('he')}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');
}

// ===== TABS =====
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['transactions','analytics','yearly'][i] === tab);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  
  if (tab === 'analytics') renderAnalytics();
  if (tab === 'yearly') renderYearly();
}

// ===== MODAL =====
function openAddModal() {
  editingIdx = null;
  document.getElementById('modalTitle').textContent = '➕ הוסף עסקה חדשה';
  document.getElementById('btnDelete').style.display = 'none';
  document.getElementById('fDate').value = new Date().toISOString().slice(0,10);
  document.getElementById('fAmount').value = '';
  document.getElementById('fBusiness').value = '';
  document.getElementById('fCategory').value = '';
  document.getElementById('fSubCategory').value = '';
  document.getElementById('fCard').value = '';
  document.getElementById('fCurrency').value = '₪';
  document.getElementById('fNotes').value = '';
  document.getElementById('modal').classList.add('open');
}

function openEditModal(idx) {
  editingIdx = idx;
  const r = allData[idx];
  document.getElementById('modalTitle').textContent = '✏️ ערוך עסקה';
  document.getElementById('btnDelete').style.display = 'block';
  document.getElementById('fDate').value = r.date;
  document.getElementById('fAmount').value = r.amount;
  document.getElementById('fBusiness').value = r.business;
  document.getElementById('fCategory').value = r.category;
  document.getElementById('fSubCategory').value = r.subCategory;
  document.getElementById('fCard').value = r.card;
  document.getElementById('fCurrency').value = r.currency || '₪';
  document.getElementById('fNotes').value = r.notes;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function saveTransaction() {
  const date = document.getElementById('fDate').value;
  const amount = parseFloat(document.getElementById('fAmount').value);
  const business = document.getElementById('fBusiness').value.trim();
  
  if (!date || !amount || !business) {
    showToast('⚠️ נא למלא תאריך, סכום ושם עסק', 'error');
    return;
  }
  
  const r = {
    date,
    business,
    category: document.getElementById('fCategory').value,
    subCategory: document.getElementById('fSubCategory').value,
    card: document.getElementById('fCard').value,
    transType: 'רגילה',
    amount: round2(amount),
    currency: document.getElementById('fCurrency').value,
    notes: document.getElementById('fNotes').value,
  };
  
  if (editingIdx !== null) {
    allData[editingIdx] = r;
    showToast('✅ העסקה עודכנה בהצלחה', 'success');
  } else {
    allData.unshift(r);
    showToast('✅ העסקה נוספה בהצלחה', 'success');
  }
  
  save();
  closeModal();
  populateFiltersUpdate();
  applyFilters();
}

function deleteTransaction() {
  if (editingIdx === null) return;
  if (!confirm('האם למחוק את העסקה?')) return;
  allData.splice(editingIdx, 1);
  save();
  closeModal();
  applyFilters();
  showToast('🗑️ העסקה נמחקה', 'success');
}

function populateFiltersUpdate() {
  // Refresh category and card options
  const cats = [...new Set(allData.map(r => r.category).filter(Boolean))].sort();
  const fc = document.getElementById('filterCategory');
  const curVal = fc.value;
  fc.innerHTML = '<option value="">הכל</option>';
  cats.forEach(c => fc.innerHTML += `<option value="${c}">${c}</option>`);
  fc.value = curVal;
}

// ===== EXPORT =====
function exportCSV() {
  const headers = ['תאריך','שם עסק','קטגוריה','תת קטגוריה','סכום','מטבע','כרטיס','הערות'];
  const rows = filtered.map(r => [
    r.date, r.business, r.category, r.subCategory, r.amount, r.currency || '₪', r.card, r.notes
  ].map(v => '"' + String(v||'').replace(/"/g,'""') + '"').join(','));
  
  const csv = '\uFEFF' + headers.join(',') + '\n' + rows.join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'expenses_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  showToast('📥 הקובץ יורד...', 'success');
}

// ===== HELPERS =====
function formatDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  return `${day}.${m}.${y}`;
}

function escHtml(s) {
  if (!s || s === 'nan') return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function round2(n) { return Math.round(n*100)/100; }

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

init();
</script>
